<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFE8D6">
<title>🏡 우리가족 할일</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/variable/pretendardvariable.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --dad: #5B8FB9; --mom: #E8A0BF; --c1: #B983FF; --c2: #94B49F;
  --bg1: #FFF8F0; --bg2: #FFF3E6; --card: #ffffff;
  --text1: #4a3f35; --text2: #6b5e50; --text3: #8a7e72; --text4: #a89888; --text5: #bbb;
  --border: #f0e6d8; --accent: #e8845c; --accent2: #FFB088; --accent-bg: #FFF3E0;
  --success: #94d2a5; --danger: #FF6B6B;
  --shadow: 0 2px 12px rgba(0,0,0,0.04);
  --radius: 16px; --radius-sm: 12px; --radius-xs: 8px;
  --safe-bottom: env(safe-area-inset-bottom, 8px);
  --tab-h: 62px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, 'Apple SD Gothic Neo', sans-serif;
  background: linear-gradient(180deg, var(--bg1), var(--bg2));
  color: var(--text1);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}
#app {
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}
/* ===== USER BAR ===== */
.user-bar {
  display:flex; background:var(--card); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:20;
}
.user-bar button {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:10px 4px 8px; border:none; background:transparent; cursor:pointer;
  border-bottom:3px solid transparent; transition:all .2s;
  font-family:inherit;
}
.user-bar button.active { border-bottom-color: var(--accent); background: var(--accent-bg); }
.user-bar button .ub-emoji { font-size:22px; }
.user-bar button .ub-name { font-size:11px; font-weight:500; color:var(--text4); }
.user-bar button.active .ub-name { font-weight:700; color:var(--accent); }

/* ===== CONTENT ===== */
.content { flex:1; padding:14px 16px calc(var(--tab-h) + var(--safe-bottom) + 10px); }

/* ===== TAB BAR ===== */
.tab-bar {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:520px;
  display:flex; background:var(--card); border-top:1px solid var(--border);
  padding:6px 0 var(--safe-bottom);
  box-shadow:0 -2px 12px rgba(0,0,0,0.04); z-index:20;
}
.tab-bar button {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:6px 0; border:none; background:transparent; cursor:pointer;
  color:var(--text4); transition:color .2s; font-family:inherit;
}
.tab-bar button.active { color:var(--accent); }
.tab-bar button .tb-icon { font-size:22px; }
.tab-bar button .tb-label { font-size:10px; font-weight:500; }
.tab-bar button.active .tb-label { font-weight:700; }

/* ===== SHARED COMPONENTS ===== */
.card {
  background:var(--card); border-radius:var(--radius); padding:16px;
  margin-bottom:12px; box-shadow:var(--shadow);
}
.card-title { font-size:14px; font-weight:700; color:var(--text2); margin-bottom:10px; }

.btn-add {
  width:100%; padding:12px; background:var(--card);
  border:2px dashed #e8c8a8; border-radius:var(--radius);
  font-size:14px; font-weight:600; color:#c49070;
  cursor:pointer; margin-bottom:12px; font-family:inherit;
}
.btn-submit {
  width:100%; padding:11px; border:none; border-radius:14px;
  font-size:14px; font-weight:700; color:#fff; cursor:pointer;
  background:linear-gradient(135deg, var(--accent2), var(--accent));
  box-shadow:0 4px 12px rgba(255,140,90,0.3);
  margin-top:12px; font-family:inherit;
}
.btn-submit:disabled { opacity:.4; }
.btn-back {
  background:none; border:none; color:#a08060;
  font-size:13px; font-weight:600; cursor:pointer;
  padding:4px 0; margin-bottom:8px; font-family:inherit;
}
.pg-title { font-size:18px; font-weight:800; color:var(--text1); margin:0 0 16px; }

input[type="text"], input[type="date"], input[type="time"], input[type="number"], textarea, select {
  width:100%; padding:10px 12px; border:2px solid var(--border);
  border-radius:var(--radius-sm); font-size:14px; outline:none;
  background:#FFFBF7; font-family:inherit; color:var(--text1);
}
textarea { resize:vertical; }

.form-label { font-size:12px; font-weight:600; color:var(--text3); margin-bottom:4px; display:block; }
.form-row { margin-top:10px; }

.chip-row { display:flex; flex-wrap:wrap; gap:5px; }
.chip {
  padding:5px 10px; border-radius:16px; border:none;
  font-size:12px; cursor:pointer; font-weight:500;
  background:#f0ebe3; color:var(--text2);
  transition:all .15s; font-family:inherit;
}
.chip.active { color:#fff; }

.filter-chip {
  padding:6px 12px; border-radius:20px; border:none;
  font-size:12px; cursor:pointer; font-weight:600; font-family:inherit;
}

.tag {
  font-size:10px; padding:2px 6px; border-radius:6px; font-weight:500;
  display:inline-block; white-space:nowrap;
}

.todo-row {
  display:flex; align-items:center; gap:8px;
  background:var(--card); border-radius:14px; padding:10px 12px;
  margin-bottom:6px; box-shadow:0 1px 4px rgba(0,0,0,0.03);
  transition:opacity .3s; border-left:3px solid transparent;
}
.todo-row.poked { border-left-color:var(--danger); }
.todo-row.done { opacity:.5; }

.check-btn {
  width:26px; height:26px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:#fff;
  cursor:pointer; flex-shrink:0;
  background:#f0ebe3; border:2px solid #d4c8ba;
}
.check-btn.checked { background:var(--success); border:none; }

.act-btn {
  background:none; border:none; font-size:16px;
  cursor:pointer; padding:2px; color:var(--text2);
}

.empty { text-align:center; padding:40px 16px; }
.empty-icon { font-size:48px; }
.empty-text { color:var(--text4); margin-top:8px; font-size:14px; line-height:1.6; }

.date-header {
  font-size:13px; font-weight:700; color:#a08060;
  padding:10px 4px 4px; border-bottom:1px solid var(--border);
  margin-bottom:6px;
}

.dday-badge {
  background:linear-gradient(135deg, #FF8C5A, #FFB088);
  color:#fff; font-size:11px; font-weight:700;
  padding:3px 8px; border-radius:8px; white-space:nowrap;
}

/* ===== OVERLAY / MODAL ===== */
.overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.4);
  display:flex; align-items:center; justify-content:center;
  z-index:100; padding:20px;
}
.modal {
  background:var(--card); border-radius:24px; padding:24px;
  max-width:360px; width:100%; max-height:80vh; overflow-y:auto;
}

/* ===== HOME ===== */
.status-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.status-chip {
  display:flex; gap:4px; align-items:center;
  padding:6px 10px; border-radius:12px;
  border:2px solid; background:#fff; font-size:13px;
}
.progress-bar {
  flex:1; height:10px; border-radius:5px;
  background:#fff3e0; overflow:hidden;
}
.progress-fill {
  height:100%; border-radius:5px;
  background:linear-gradient(90deg, var(--accent2), var(--accent));
  transition:width .5s ease;
}

/* ===== CALENDAR ===== */
.cal-nav { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:8px; }
.cal-nav button { background:none; border:none; font-size:16px; color:#a08060; cursor:pointer; padding:4px 8px; }
.cal-nav span { font-size:17px; font-weight:700; color:#5a4a3a; }
.cal-week { display:grid; grid-template-columns:repeat(7,1fr); text-align:center; margin-bottom:2px; }
.cal-week div { font-size:11px; font-weight:600; padding:4px 0; color:var(--text3); }
.cal-week div:first-child { color:#e88; }
.cal-week div:last-child { color:#68b; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
.cal-cell {
  aspect-ratio:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  border-radius:10px; cursor:pointer;
  border:2px solid transparent; transition:all .15s;
  padding:1px;
}
.cal-cell.today { background:var(--accent-bg); }
.cal-cell.today .cal-day { font-weight:700; color:var(--accent); }
.cal-cell.selected { border-color:#e8a87c; background:#FFF8F0; }
.cal-day { font-size:12px; color:var(--text2); }
.cal-dots { display:flex; gap:1px; margin-top:1px; }
.cal-dot { width:5px; height:5px; border-radius:3px; }

/* ===== EVENT STRIP ===== */
.event-strip {
  display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; margin-bottom:6px;
  scrollbar-width:none; -ms-overflow-style:none;
}
.event-strip::-webkit-scrollbar { display:none; }
.event-chip {
  flex-shrink:0; background:var(--card); border-radius:12px;
  padding:8px 12px; box-shadow:0 1px 4px rgba(0,0,0,0.04);
}

/* ===== QUEST ===== */
.char-card {
  text-align:center; border-radius:var(--radius); padding:20px;
  margin-bottom:12px; box-shadow:var(--shadow);
}
.exp-bar { height:10px; border-radius:5px; background:#f0ebe3; overflow:hidden; margin:0 auto; width:80%; }
.exp-fill { height:100%; border-radius:5px; transition:width .5s; }
.point-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.point-box { text-align:center; padding:12px; border-radius:14px; }
.big-btn {
  background:var(--card); border-radius:18px; padding:20px;
  border:none; box-shadow:var(--shadow); cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:6px;
  font-family:inherit; width:100%;
}

/* ===== ROULETTE ===== */
.roulette-wrap { display:flex; justify-content:center; margin-bottom:24px; }
.roulette-outer { position:relative; width:200px; height:200px; }
.roulette-arrow { position:absolute; top:-14px; left:50%; transform:translateX(-50%); font-size:22px; z-index:2; }
.roulette-wheel {
  width:200px; height:200px; border-radius:50%;
  border:4px solid #FFE8D6;
  display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr;
  overflow:hidden; transition:transform 3s cubic-bezier(0.17,0.67,0.12,0.99);
}
.roulette-cell { display:flex; align-items:center; justify-content:center; font-size:32px; }

/* ===== SHOP ===== */
.shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.shop-card { text-align:center; padding:14px; }
.shop-emoji { font-size:36px; }
.shop-name { font-size:13px; font-weight:600; color:var(--text1); margin:6px 0; }

/* ===== FEED ===== */
.feed-card {
  background:var(--card); border-radius:var(--radius); padding:12px;
  margin-bottom:8px; box-shadow:0 1px 6px rgba(0,0,0,0.03);
}
.reaction-row { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; align-items:center; }
.reaction-btn {
  border:none; border-radius:16px; padding:4px 8px;
  font-size:14px; cursor:pointer; background:#f5f0ea;
  display:flex; align-items:center; gap:2px; font-family:inherit;
}
.reaction-btn.active { background:#FFE8D6; font-weight:700; }
.comment-list { margin-top:6px; padding-left:8px; border-left:2px solid var(--border); }
.comment-item { font-size:12px; color:var(--text2); padding:2px 0; }

/* ===== FAMILY CHAT ===== */
.chat-messages {
  height:280px; overflow-y:auto; padding:10px 16px;
  display:flex; flex-direction:column; gap:10px; margin-top:10px;
}
.chat-msg { display:flex; flex-direction:column; max-width:78%; }
.chat-msg.me { align-self:flex-end; align-items:flex-end; }
.chat-msg.other { align-self:flex-start; align-items:flex-start; }
.chat-msg-name { font-size:11px; color:var(--text4); margin-bottom:2px; padding:0 2px; }
.chat-bubble {
  padding:9px 12px; border-radius:14px; font-size:13px; line-height:1.5;
  word-break:break-word; background:#f5efe8; color:var(--text1);
}
.chat-msg.me .chat-bubble { color:#fff; border-bottom-right-radius:4px; }
.chat-msg.other .chat-bubble { border-bottom-left-radius:4px; }
.chat-msg-time { font-size:10px; color:var(--text5); margin-top:2px; padding:0 2px; }
.chat-input-row { display:flex; gap:8px; padding:10px 16px; border-top:1px solid var(--border); }
.chat-input-row input { flex:1; }
.chat-input-row button {
  padding:0 16px; border:none; border-radius:12px; background:var(--accent);
  color:#fff; font-weight:700; cursor:pointer; font-family:inherit;
}

/* ===== GAME ===== */
.game-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:6px;
  max-width:240px; margin:16px auto;
}
.game-cell {
  aspect-ratio:1; border-radius:14px; border:2px solid var(--border);
  background:var(--card); font-size:32px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-family:inherit; transition:background .15s;
}
.game-cell.filled { background:#FFF8F0; }
.game-hub-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:14px; }
.rps-btn {
  font-size:40px; background:#fff; border:2px solid var(--border);
  border-radius:16px; padding:14px; cursor:pointer;
}
.mem-grid {
  display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
  max-width:280px; margin:16px auto;
}
.mem-cell {
  aspect-ratio:1; border-radius:12px; border:none; cursor:pointer;
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  font-size:24px; display:flex; align-items:center; justify-content:center;
  font-family:inherit; color:#fff;
}
.mem-cell.open { background:#fff; border:2px solid var(--border); color:inherit; }
.mem-cell.matched { background:#CAFFBF; border:2px solid #94d2a5; color:inherit; opacity:.7; }
.reaction-box {
  height:220px; border-radius:20px; display:flex; align-items:center;
  justify-content:center; flex-direction:column; gap:8px; cursor:pointer;
  user-select:none; margin:16px 0; transition:background .2s; text-align:center;
}

/* ===== RESPONSIVE ===== */
@media (min-width:521px) {
  .content { padding-left:24px; padding-right:24px; }
  .card { padding:20px; }
  .todo-row { padding:12px 16px; }
  .point-grid { gap:14px; }
  .shop-grid { gap:14px; }
}
@media (max-width:360px) {
  .user-bar button { padding:8px 2px 6px; }
  .user-bar button .ub-emoji { font-size:18px; }
  .user-bar button .ub-name { font-size:9px; }
  .tab-bar button .tb-icon { font-size:18px; }
  .tab-bar button .tb-label { font-size:9px; }
  .chip { font-size:11px; padding:4px 8px; }
}

/* ===== HIDE SCROLLBAR ===== */
.content::-webkit-scrollbar { width:0; }
.content { scrollbar-width:none; }

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn .25s ease; }

/* ===== AI BOT ===== */
.bot-fab {
  position:fixed; right:16px; bottom:calc(var(--tab-h) + var(--safe-bottom) + 14px);
  width:52px; height:52px; border-radius:50%; border:none; cursor:grab;
  background:linear-gradient(135deg, var(--accent2), var(--accent)); color:#fff;
  font-size:24px; box-shadow:0 4px 14px rgba(232,132,92,0.4); z-index:25;
  display:flex; align-items:center; justify-content:center;
  touch-action:none; user-select:none;
}
.bot-fab.dragging { cursor:grabbing; box-shadow:0 6px 20px rgba(232,132,92,0.55); transform:scale(1.06); }
.bot-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.3); z-index:28; }
.bot-panel {
  position:fixed; left:50%; transform:translateX(-50%); bottom:0;
  width:100%; max-width:520px; height:min(70vh,560px);
  background:var(--card); border-radius:20px 20px 0 0;
  box-shadow:0 -4px 24px rgba(0,0,0,0.15); z-index:30;
  display:none; flex-direction:column; overflow:hidden;
}
.bot-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px; border-bottom:1px solid var(--border);
  font-weight:700; font-size:14px; flex-shrink:0;
}
.bot-header button { background:none; border:none; font-size:16px; cursor:pointer; color:var(--text3); }
.bot-messages {
  flex:1; overflow-y:auto; padding:12px 16px;
  display:flex; flex-direction:column; gap:8px;
}
.bot-msg {
  max-width:82%; padding:10px 12px; border-radius:14px;
  font-size:13px; line-height:1.5; white-space:pre-wrap;
}
.bot-msg.bot { align-self:flex-start; background:#f5efe8; color:var(--text1); border-bottom-left-radius:4px; }
.bot-msg.user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
.bot-quick { display:flex; gap:6px; flex-wrap:wrap; padding:0 16px 8px; flex-shrink:0; }
.bot-input-row {
  display:flex; gap:8px; padding:10px 16px calc(10px + var(--safe-bottom));
  border-top:1px solid var(--border); flex-shrink:0;
}
.bot-input-row input { flex:1; }
.bot-input-row button {
  padding:0 16px; border:none; border-radius:12px; background:var(--accent);
  color:#fff; font-weight:700; cursor:pointer; font-family:inherit;
}
</style>
</head>
<body>
<div id="app">
  <div class="user-bar" id="userBar"></div>
  <div class="content" id="contentArea"></div>
  <div class="tab-bar" id="tabBar"></div>
</div>
<div class="overlay" id="overlay" style="display:none" onclick="closeModal()">
  <div class="modal" id="modalContent" onclick="event.stopPropagation()"></div>
</div>
<button class="bot-fab" id="botFab" title="AI 가족 비서 (드래그로 위치 이동 가능)">🤖</button>
<div class="bot-backdrop" id="botBackdrop" style="display:none" onclick="toggleBot()"></div>
<div class="bot-panel" id="botPanel" onclick="event.stopPropagation()"></div>

<script>
/* ===== DATA ===== */
const FM = [
  {id:"dad",name:"아빠",emoji:"👨",color:"#5B8FB9",role:"parent"},
  {id:"mom",name:"엄마",emoji:"👩",color:"#E8A0BF",role:"parent"},
  {id:"child1",name:"첫째",emoji:"👧",color:"#B983FF",role:"middle"},
  {id:"child2",name:"둘째",emoji:"🧒",color:"#94B49F",role:"elementary"},
];
const CATS = [
  {id:"house",name:"집안일",emoji:"🏠",color:"#FFD6A5"},
  {id:"grocery",name:"장보기",emoji:"🛒",color:"#CAFFBF"},
  {id:"cook",name:"요리",emoji:"🍳",color:"#FFB5B5"},
  {id:"study",name:"공부",emoji:"📚",color:"#BDB2FF"},
  {id:"errand",name:"외출/셔틀",emoji:"🚗",color:"#A0C4FF"},
  {id:"prep",name:"준비물",emoji:"🎒",color:"#FFC6FF"},
  {id:"etc",name:"기타",emoji:"✨",color:"#FFFFB5"},
];
const STATUSES=["😊 여유있음","📱 연락가능","🏃 외출중","🚗 운전중","📖 시험기간","💼 야근중","😴 취침중"];
const PRESETS=[
  {text:"쓰레기 버리기",points:10,cat:"house"},{text:"빨래바구니에 넣기",points:20,cat:"house"},
  {text:"분리수거",points:30,cat:"house"},{text:"신발 정돈",points:10,cat:"house"},
  {text:"설거지",points:25,cat:"house"},{text:"청소기 돌리기",points:30,cat:"house"},
  {text:"베란다 청소",points:35,cat:"house"},{text:"화장실 청소",points:40,cat:"house"},
  {text:"택배 박스 정리",points:15,cat:"house"},
];
const QUEST_NAMES={house:"🐉 먼지 몬스터 소탕",grocery:"📦 식량 보급 미션",cook:"🧙 요리 마법사 도전",study:"📖 지식의 던전 탐험",errand:"🗺️ 용사의 외출 퀘스트",prep:"🛡️ 장비 점검 미션",etc:"🔮 비밀 임무 수행"};
const SHOP=[
  {id:"s1",name:"간식 선택권",cost:50,emoji:"🍪"},{id:"s2",name:"TV 리모컨 30분권",cost:80,emoji:"📺"},

const fmtDate=(s)=>{if(!s)return'';const d=new Date(s+'T00:00:00');const w=["일","월","화","수","목","금","토"];return `${d.getMonth()+1}/${d.getDate()}(${w[d.getDay()]})`;};
const ddayCalc=(s)=>{const diff=Math.ceil((new Date(s+'T00:00:00')-new Date(getToday()+'T00:00:00'))/86400000);return diff===0?'D-Day!':diff>0?`D-${diff}`:`D+${Math.abs(diff)}`;};

/* ===== PERSISTENCE ===== */
function loadState(){
  try{const s=localStorage.getItem('fam-app-v4');if(s){const p=JSON.parse(s);Object.assign(S,p);}}catch(e){}
}
function saveState(){
  try{localStorage.setItem('fam-app-v4',JSON.stringify(S));}catch(e){}
}

/* ===== CORE ACTIONS ===== */
function toggleTodo(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  const done=!t.done; const pts=t.points||10;
  if(done){
    S.points[t.assignee]=(S.points[t.assignee]||0)+pts;
    const ch=S.characters[t.assignee]||(S.characters[t.assignee]={level:1,exp:0,items:["🏠"]});
    ch.exp+=pts;
    if(ch.exp>=ch.level*100){ch.level++;ch.exp-=(ch.level-1)*100;ch.items.push(["🌸","⭐","🎀","🏅","🎯","💎"][Math.floor(Math.random()*6)]);}
    S.feed.unshift({id:uid(),type:"done",user:t.assignee,text:t.text,points:pts,date:getToday(),time:new Date().toLocaleTimeString("ko",{hour:"2-digit",minute:"2-digit"}),reactions:{},comments:[]});
  } else {
    S.points[t.assignee]=Math.max(0,(S.points[t.assignee]||0)-pts);
  }
  t.done=done;
  saveState(); render();
}
function deleteTodo(id){ S.todos=S.todos.filter(t=>t.id!==id); saveState(); render(); }
function pokeTodo(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  t.poked=true;
  S.feed.unshift({id:uid(),type:"poke",from:currentUser,to:t.assignee,text:t.text,date:getToday(),time:new Date().toLocaleTimeString("ko",{hour:"2-digit",minute:"2-digit"}),reactions:{},comments:[]});
  saveState(); render();
}
function tossTodo(id){
  const t=S.todos.find(x=>x.id===id);if(!t)return;
  let html=`<h3 style="margin:0 0 12px;color:var(--text1)">🤝 대신 해줘요</h3>
  <p style="font-size:13px;color:var(--text3);margin:0 0 16px">"${esc(t.text)}" 도움을 요청할 가족을 선택하세요</p>`;
  FM.filter(m=>m.id!==t.assignee).forEach(m=>{
    html+=`<button onclick="doToss('${id}','${m.id}')" style="display:block;width:100%;padding:12px 16px;background:${m.color}22;border:1px solid ${m.color}44;border-radius:14px;font-size:14px;cursor:pointer;margin-bottom:8px;font-family:inherit">${m.emoji} ${m.name}에게 부탁하기</button>`;
  });
  openModal(html);
}
function doToss(tid,mid){
  const t=S.todos.find(x=>x.id===tid);if(!t)return;
  S.feed.unshift({id:uid(),type:"toss",from:t.assignee,to:mid,text:t.text,date:getToday(),time:new Date().toLocaleTimeString("ko",{hour:"2-digit",minute:"2-digit"}),reactions:{},comments:[]});
  t.tossedTo=mid; t.assignee=mid;
  closeModal(); saveState(); render();
}
function openModal(html){document.getElementById('overlay').style.display='flex';document.getElementById('modalContent').innerHTML=html;}
function closeModal(){document.getElementById('overlay').style.display='none';}

/* ===== WEEK STATS ===== */
function getWeekStats(){
  const ws=new Date();ws.setDate(ws.getDate()-ws.getDay());
  const wsStr=`${ws.getFullYear()}-${String(ws.getMonth()+1).padStart(2,'0')}-${String(ws.getDate()).padStart(2,'0')}`;
  const wt=S.todos.filter(t=>t.date>=wsStr&&t.done);
  return FM.map(m=>({name:m.name,emoji:m.emoji,color:m.color,
    count:wt.filter(t=>t.assignee===m.id).length,
    points:wt.filter(t=>t.assignee===m.id).reduce((s,t)=>s+(t.points||10),0)}));
}

function render(){

  const c=document.getElementById('contentArea');
  if(currentTab===0) renderHome(c);
  else if(currentTab===1&&!currentSub) renderTodos(c);
  else if(currentTab===1&&currentSub==='grocery') renderGrocery(c);
  else if(currentTab===1&&currentSub==='checklist') renderChecklist(c);
  else if(currentTab===2) renderCalendar(c);
  else if(currentTab===3&&!currentSub) renderQuest(c);
  else if(currentTab===3&&currentSub==='shop') renderShop(c);
  else if(currentTab===3&&currentSub==='roulette') renderRoulette(c);
  else if(currentTab===4&&!currentSub) renderSocial(c);
  else if(currentTab===4&&currentSub==='game') renderGame(c);
}

    </div>
    <button class="btn-submit" onclick="createPoll()">투표 시작 🗳️</button>`;
  openModal(html);
}
function createPoll(){
  const q=document.getElementById('pollQ').value.trim();
  const o1=document.getElementById('pollOpt1').value.trim();
  const o2=document.getElementById('pollOpt2').value.trim();
  const o3=document.getElementById('pollOpt3').value.trim();
  if(!q||!o1||!o2){alert('질문과 옵션 2개는 필수예요!');return;}
  const options=[{id:'a',text:o1},{id:'b',text:o2}];
  if(o3) options.push({id:'c',text:o3});
  S.poll={id:uid(),question:q,options,votes:{},creator:currentUser,createdAt:Date.now()};
  closeModal(); saveState(); render();
}
function votePoll(optId){
  if(!S.poll)return;
  if(!S.poll.votes)S.poll.votes={};
  S.poll.votes[currentUser]=optId;
  saveState(); render();
}
function closePoll(){ S.poll=null; saveState(); render(); }

/* ===== PHOTO OF THE DAY ===== */
function uploadPhoto(inp){
  const file=inp.files&&inp.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=800;
      const scale=Math.min(1,maxW/img.width);
      const canvas=document.createElement('canvas');
      canvas.width=Math.round(img.width*scale); canvas.height=Math.round(img.height*scale);
      const cctx=canvas.getContext('2d');
      cctx.drawImage(img,0,0,canvas.width,canvas.height);
      const dataUrl=canvas.toDataURL('image/jpeg',0.7);
      if(!S.photos)S.photos=[];
      S.photos.unshift({id:uid(),user:currentUser,date:getToday(),time:new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit'}),dataUrl});
      saveState(); render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
  inp.value='';
}
function viewPhoto(id){
  const p=(S.photos||[]).find(x=>x.id===id); if(!p)return;
  openModal(`<div style="text-align:center"><img src="${p.dataUrl}" style="max-width:100%;border-radius:12px"><div style="margin-top:8px;font-size:12px;color:var(--text4)">${gM(p.user).emoji} ${gM(p.user).name} · ${p.time}</div></div>`);
}

/* ===== CALENDAR ===== */
let showEventForm=false;
function renderCalendar(el){
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const fd=new Date(calYear,calMonth,1).getDay();
  const events=(S.events||[]).sort((a,b)=>a.date.localeCompare(b.date));

  let h=`<div class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div class="cal-nav">
        <button onclick="calMonth--;if(calMonth<0){calYear--;calMonth=11;}render()">◀</button>
        <span>${calYear}년 ${calMonth+1}월</span>
        <button onclick="calMonth++;if(calMonth>11){calYear++;calMonth=0;}render()">▶</button>
      </div>
      <button class="filter-chip" style="background:#FFE8D6;color:#c47030" onclick="showEventForm=!showEventForm;render()">${showEventForm?'✕':'🎯 행사'}</button>
    </div>`;
  // Event form
  if(showEventForm){
    h+=`<div class="card" style="margin-bottom:12px">
      <input type="text" id="evTitle" placeholder="행사명 (예: 엄마 생일, 가족여행)">
      <div style="display:flex;gap:8px;margin-top:8px">
        <input type="date" id="evDate" value="${getToday()}" style="flex:1">
        <button class="btn-submit" style="margin-top:0;flex:1" onclick="addEvent()">추가 🎯</button>
      </div>
    </div>`;
  }
  // Event strip
  if(events.length){
    h+=`<div class="event-strip">`;
    events.slice(0,5).forEach(ev=>{
      h+=`<div class="event-chip"><span style="font-size:11px;font-weight:700;color:var(--accent)">${ddayCalc(ev.date)}</span><div style="font-size:12px;white-space:nowrap">${esc(ev.title)}</div></div>`;
    });
    h+=`</div>`;
  }
  // Calendar grid
  h+=`<div class="cal-week">${["일","월","화","수","목","금","토"].map(d=>`<div>${d}</div>`).join('')}</div>`;
  h+=`<div class="cal-grid">`;
  for(let i=0;i<fd;i++) h+=`<div class="cal-cell"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dt=S.todos.filter(t=>t.date===ds&&(!t.isPrivate||t.assignee===currentUser));
    const de=(S.events||[]).filter(e=>e.date===ds);
    const isT=ds===getToday();const isSel=calSel===ds;
    h+=`<div class="cal-cell ${isT?'today':''} ${isSel?'selected':''}" onclick="calSel=calSel==='${ds}'?null:'${ds}';render()">
      <span class="cal-day">${d}</span>
      ${de.length?'<div class="cal-dot" style="width:5px;height:5px;border-radius:3px;background:var(--danger);margin-top:1px"></div>':''}
      ${dt.length?`<div class="cal-dots">${dt.slice(0,3).map(t=>`<div class="cal-dot" style="background:${gM(t.assignee).color}"></div>`).join('')}</div>`:''}
    </div>`;
  }
  h+=`</div>`;
  // Selected day details
  if(calSel){
    const day=parseInt(calSel.split('-')[2]);
    const dt=S.todos.filter(t=>t.date===calSel&&(!t.isPrivate||t.assignee===currentUser));
    const de=(S.events||[]).filter(e=>e.date===calSel);
    h+=`<div style="margin-top:12px"><div class="date-header">${fmtDate(calSel)}</div>`;
    de.forEach(ev=>{h+=`<div class="card" style="margin-bottom:8px;border-left:4px solid var(--danger);padding:12px"><div style="font-weight:700;color:var(--accent)">${esc(ev.title)}</div><span style="font-size:11px;color:var(--text5)">${ddayCalc(ev.date)}</span></div>`;});
    if(!dt.length&&!de.length) h+=`<p style="text-align:center;color:var(--text4);padding:16px">일정이 없어요 🎉</p>`;
    dt.forEach(t=>{
      const m=gM(t.assignee);
      h+=`<div class="todo-row ${t.done?'done':''}">
        <button class="check-btn ${t.done?'checked':''}" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</button>
        <span style="flex:1;font-size:13px;${t.done?'text-decoration:line-through;color:var(--text5)':''}">${esc(t.text)}</span>
        ${t.time?`<span style="font-size:11px;color:#5B8FB9">⏰${t.time}</span>`:''}
        <span style="font-size:16px">${m.emoji}</span>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}
function addEvent(){
  const t=document.getElementById('evTitle'),d=document.getElementById('evDate');
  if(!t||!t.value.trim())return;
  S.events.push({id:uid(),title:t.value.trim(),date:d.value||getToday()});
  showEventForm=false; saveState(); render();

function spinRoulette(){
  if(rouletteSpinning)return;
  rouletteSpinning=true;rouletteResult=null;render();
  const idx=Math.floor(Math.random()*FM.length);
  rouletteAngle+=1440+(idx*90)+Math.random()*30;
  const wheel=document.getElementById('rouletteWheel');
  if(wheel)wheel.style.transform=`rotate(${rouletteAngle}deg)`;
  setTimeout(()=>{rouletteResult=FM[idx];rouletteSpinning=false;render();},3100);

function renderTicTacToe(el){

    <button class="btn-back" onclick="currentGame=null;render()">← 게임 목록</button>

    </div>

    </div>

function playGame(i){
  if(gameBoard[i]||gameWinner)return;
  gameBoard[i]=gamePlayers[gameTurn%2].emoji;
  const w=checkGame(gameBoard);
  if(w){gameWinner=w==='draw'?'무승부!':w+' 승리!';}else gameTurn++;
  render();
}
function checkGame(b){
  const l=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(const [a,c,d] of l) if(b[a]&&b[a]===b[c]&&b[a]===b[d]) return b[a];
  return b.every(Boolean)?'draw':null;
}
function resetGame(){gameBoard=Array(9).fill(null);gameTurn=0;gameWinner=null;render();}

/* ----- 가위바위보 대결 ----- */
const RPS_EMOJI={rock:'✊',scissors:'✌️',paper:'✋'};
const RPS_BEAT={rock:'scissors',scissors:'paper',paper:'rock'};
let rpsScore={1:0,2:0},rpsPhase=1,rpsChoice1=null,rpsChoice2=null,rpsRoundMsg='';
function renderRPS(el){

      <button class="btn-submit" style="width:auto;padding:10px 30px;margin-top:8px" onclick="rpsPhase=3;render()">확인했어요</button></div>`;
  } else if(rpsPhase===3){
    body=`<p style="text-align:center;font-size:14px;font-weight:700;margin:16px 0">${p2.emoji} ${p2.name}님 차례 — 선택하세요!</p>
      <div style="display:flex;justify-content:center;gap:14px">${['rock','scissors','paper'].map(c=>`<button class="rps-btn" onclick="rpsPick(2,'${c}')">${RPS_EMOJI[c]}</button>`).join('')}</div>`;

    body=`<div style="text-align:center;margin:16px 0">
      <div style="display:flex;justify-content:center;gap:24px;font-size:48px">

        <div style="font-size:22px;align-self:center;color:var(--text4)">VS</div>
        <div>${RPS_EMOJI[rpsChoice2]}<div style="font-size:12px;margin-top:4px">${p2.name}</div></div>
      </div>
      <p style="font-size:16px;font-weight:800;margin-top:12px;color:var(--accent)">${rpsRoundMsg}</p>
      <button class="btn-submit" style="width:auto;padding:10px 30px;margin-top:8px" onclick="rpsNextRound()">${rpsScore[1]>=3||rpsScore[2]>=3?'다시 하기 🔄':'다음 라운드 ▶'}</button>
    </div>`;
  }
  let h=`<div class="fade-in">
    <button class="btn-back" onclick="currentGame=null;render()">← 게임 목록</button>
    <h2 class="pg-title">✊✌️✋ 가위바위보 대결</h2>
    <div style="display:flex;justify-content:center;gap:30px;font-size:13px;color:var(--text3)">

    </div>

  </div>`;

function rpsPick(player,choice){
  if(player===1){ rpsChoice1=choice; rpsPhase=2; }
  else {
    rpsChoice2=choice;
    if(rpsChoice1===rpsChoice2) rpsRoundMsg='🤝 비겼어요!';
    else if(RPS_BEAT[rpsChoice1]===rpsChoice2){ rpsScore[1]++; rpsRoundMsg=`${gamePlayers[0].name}님 승리! 🎉`; }
    else { rpsScore[2]++; rpsRoundMsg=`${gamePlayers[1].name}님 승리! 🎉`; }
    rpsPhase=4;
  }
  render();
}
function rpsNextRound(){
  if(rpsScore[1]>=3||rpsScore[2]>=3) rpsScore={1:0,2:0};
  rpsChoice1=null; rpsChoice2=null; rpsRoundMsg=''; rpsPhase=1;
  render();
}

/* ----- 기억력 카드 짝맞추기 ----- */
const MEM_EMOJIS=['🍎','🍌','🍇','🍓','🍉','🍒'];
let memCards=[],memFlipped=[],memMoves=0,memMatchedCount=0;
function initMemory(){
  const pool=[...MEM_EMOJIS,...MEM_EMOJIS];
  for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
  memCards=pool.map(e=>({emoji:e,open:false,matched:false}));
  memFlipped=[]; memMoves=0; memMatchedCount=0;
}
function renderMemory(el){
  if(!memCards.length) initMemory();
  const win=memMatchedCount===MEM_EMOJIS.length;
  let h=`<div class="fade-in">
    <button class="btn-back" onclick="currentGame=null;render()">← 게임 목록</button>
    <h2 class="pg-title">🃏 기억력 카드 짝맞추기</h2>
    <p style="text-align:center;font-size:13px;color:var(--text3)">시도 횟수: ${memMoves}회</p>
    <div class="mem-grid">${memCards.map((c,i)=>`<button class="mem-cell ${c.matched?'matched':c.open?'open':''}" onclick="flipMemCard(${i})">${(c.open||c.matched)?c.emoji:'❓'}</button>`).join('')}</div>
    ${win?`<div style="text-align:center;margin-top:14px"><p style="font-weight:800;color:var(--accent)">🎉 ${memMoves}번 만에 완성!</p><button class="btn-submit" style="width:auto;padding:10px 30px" onclick="initMemory();render()">다시 하기 🔄</button></div>`
    :`<div style="text-align:center;margin-top:14px"><button class="filter-chip" style="background:#f5efe8;color:var(--text3);padding:8px 20px" onclick="initMemory();render()">새로 섞기 🔀</button></div>`}
  </div>`;
  el.innerHTML=h;
}
function flipMemCard(i){
  const c=memCards[i];
  if(c.open||c.matched||memFlipped.length>=2)return;
  c.open=true; memFlipped.push(i);
  render();
  if(memFlipped.length===2){
    memMoves++;
    const [a,b]=memFlipped;
    if(memCards[a].emoji===memCards[b].emoji){
      memCards[a].matched=true; memCards[b].matched=true; memMatchedCount++;
      memFlipped=[]; render();
    } else {
      setTimeout(()=>{ memCards[a].open=false; memCards[b].open=false; memFlipped=[]; render(); },700);
    }
  }
}

/* ----- 반응속도 테스트 ----- */
let reactState='idle',reactStartTime=0,reactResultMs=null,reactTimer=null;
function renderReaction(el){
  const best=S.reactionBest||{};
  let box;
  if(reactState==='waiting'){
    box=`<div class="reaction-box" style="background:#FFB3B3" onclick="reactTooSoon()"><div style="font-size:40px">✋</div><div style="font-weight:700">기다리세요...</div></div>`;
  } else if(reactState==='ready'){
    box=`<div class="reaction-box" style="background:#94d2a5" onclick="reactClick()"><div style="font-size:40px">⚡</div><div style="font-weight:700">지금 클릭!</div></div>`;
  } else if(reactState==='toosoon'){
    box=`<div class="reaction-box" style="background:#f5efe8" onclick="startReaction()"><div style="font-size:40px">😅</div><div style="font-weight:700">너무 빨랐어요! 다시 도전</div></div>`;
  } else if(reactState==='result'){
    box=`<div class="reaction-box" style="background:#FFF3E0" onclick="startReaction()"><div style="font-size:32px;font-weight:800;color:var(--accent)">${reactResultMs}ms</div><div style="font-size:12px;color:var(--text3)">탭해서 다시 도전</div></div>`;
  } else {
    box=`<div class="reaction-box" style="background:#FFE8D6" onclick="startReaction()"><div style="font-size:40px">🎯</div><div style="font-weight:700">클릭해서 시작하기</div></div>`;
  }
  const ranked=FM.map(m=>({...m,best:best[m.id]})).filter(m=>m.best!=null).sort((a,b)=>a.best-b.best);
  let h=`<div class="fade-in">
    <button class="btn-back" onclick="currentGame=null;render()">← 게임 목록</button>
    <h2 class="pg-title">⚡ 반응속도 테스트</h2>
    <p style="text-align:center;font-size:13px;color:var(--text3)">초록색으로 바뀌면 최대한 빨리 클릭하세요!</p>
    ${box}
    ${ranked.length?`<div class="card"><div class="card-title">🏆 가족 최고기록</div>${ranked.map((m,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0"><span style="width:20px">${i+1}</span><span>${m.emoji}</span><span style="flex:1;font-size:13px">${m.name}</span><b style="color:${m.color}">${m.best}ms</b></div>`).join('')}</div>`:''}
  </div>`;
  el.innerHTML=h;
}
function startReaction(){
  reactState='waiting'; render();
  const delay=1000+Math.random()*3000;
  reactTimer=setTimeout(()=>{ reactState='ready'; reactStartTime=Date.now(); render(); },delay);
}
function reactTooSoon(){
  if(reactState!=='waiting')return;
  clearTimeout(reactTimer);
  reactState='toosoon'; render();
}
function reactClick(){
  if(reactState!=='ready')return;
  const ms=Date.now()-reactStartTime;
  reactResultMs=ms; reactState='result';
  if(!S.reactionBest)S.reactionBest={};
  if(S.reactionBest[currentUser]==null||ms<S.reactionBest[currentUser]){
    S.reactionBest[currentUser]=ms; saveState();
  }
  render();
}

let botOpen=false, botMsgs=[];
const BOT_QUICK=['오늘 할일','포인트 순위','다음 일정','준비물 확인','밀린 할일','장보기 목록'];

function buildBotInsights(){
  const insights=[];
  const todayT=S.todos.filter(t=>t.date===getToday()&&(!t.isPrivate||t.assignee===currentUser));
  const doneToday=todayT.filter(t=>t.done).length;
  insights.push(todayT.length?`📋 오늘 할일 ${doneToday}/${todayT.length}개 완료했어요.`:'📋 오늘 등록된 할일이 없어요.');
  const overdue=S.todos.filter(t=>!t.done&&t.date<getToday());
  if(overdue.length) insights.push(`⏰ 기한이 지난 할일이 ${overdue.length}개 있어요.`);
  const events=(S.events||[]).filter(e=>new Date(e.date+'T00:00:00')>=new Date(getToday()+'T00:00:00')).sort((a,b)=>a.date.localeCompare(b.date));
  if(events.length) insights.push(`🎯 다가오는 일정: ${events[0].title} (${ddayCalc(events[0].date)})`);
  const prep=S.todos.filter(t=>t.category==='prep'&&!t.done&&t.date>=getToday());
  if(prep.length) insights.push(`🎒 준비물 ${prep.length}개가 아직 안 챙겨졌어요.`);
  const ws=getWeekStats().filter(s=>s.points>0).sort((a,b)=>b.points-a.points);
  if(ws.length) insights.push(`⭐ 이번주 1위는 ${ws[0].emoji}${ws[0].name}, ${ws[0].points}점이에요!`);
  return insights;
}

function generateBotReply(q){
  q=(q||'').trim();
  if(!q) return '무엇이 궁금하세요? 😊';
  if(/안녕|hi|hello/i.test(q)) return `안녕하세요 ${gM(currentUser).name}님! 오늘도 화이팅이에요 💪`;
  if(/오늘.*할일|할일.*오늘|투두|할 일/.test(q)){
    const todayT=S.todos.filter(t=>t.date===getToday()&&(!t.isPrivate||t.assignee===currentUser));
    if(!todayT.length) return '오늘은 등록된 할일이 없어요! 여유로운 하루 보내세요 😊';
    return '오늘의 할일이에요:\n'+todayT.map(t=>`${t.done?'✅':'⬜'} ${t.text} (${gM(t.assignee).name})`).join('\n');
  }
  if(/미룬|밀린|기한|지난/.test(q)){
    const overdue=S.todos.filter(t=>!t.done&&t.date<getToday());
    if(!overdue.length) return '밀린 할일이 없어요! 완벽해요 🎉';
    return `기한이 지난 할일이 ${overdue.length}개 있어요:\n`+overdue.slice(0,5).map(t=>`⏰ ${t.text} (${gM(t.assignee).name}, ${fmtDate(t.date)})`).join('\n');
  }
  if(/포인트|점수|순위|기여도/.test(q)){
    const ranked=FM.map(m=>({...m,pt:S.points[m.id]||0})).sort((a,b)=>b.pt-a.pt);
    return '⭐ 포인트 순위예요:\n'+ranked.map((m,i)=>`${i+1}위 ${m.emoji}${m.name} - ${m.pt}점`).join('\n');
  }
  if(/일정|이벤트|행사|디데이|d-day/i.test(q)){
    const events=(S.events||[]).filter(e=>new Date(e.date+'T00:00:00')>=new Date(getToday()+'T00:00:00')).sort((a,b)=>a.date.localeCompare(b.date));
    if(!events.length) return '다가오는 일정이 없어요.';
    return '🎯 다가오는 일정이에요:\n'+events.slice(0,5).map(e=>`${ddayCalc(e.date)} ${e.title}`).join('\n');
  }
  if(/준비물/.test(q)){
    const prep=S.todos.filter(t=>t.category==='prep'&&!t.done);
    if(!prep.length) return '준비물이 모두 준비됐어요 ✅';
    return '🎒 아직 안 챙긴 준비물이에요:\n'+prep.map(t=>`${t.text} (${gM(t.assignee).name}, ${ddayCalc(t.date)})`).join('\n');
  }
  if(/장보기|장 볼|살 것/.test(q)){
    const g=(S.groceries||[]).filter(x=>!x.done);
    if(!g.length) return '장볼 목록이 비어있어요 🛒';
    return '🛒 장볼 목록이에요:\n'+g.map(x=>x.text).join(', ');
  }
  if(/칭찬|잘했|고생/.test(q)){
    const ranked=FM.map(m=>({...m,pt:S.points[m.id]||0})).sort((a,b)=>b.pt-a.pt);
    return `이번엔 ${ranked[0].emoji}${ranked[0].name}님이 최고예요! 다같이 박수 👏👏`;
  }
  if(/누가.*안|안한|안 챙긴|미완료/.test(q)){
    const notDone=S.todos.filter(t=>!t.done&&t.date<=getToday());
    if(!notDone.length) return '모두 잘 하고 있어요! 미완료 할일이 없어요 🎉';
    const byPerson={};
    notDone.forEach(t=>{byPerson[t.assignee]=(byPerson[t.assignee]||0)+1;});
    return Object.entries(byPerson).map(([id,c])=>`${gM(id).emoji}${gM(id).name}: ${c}개`).join('\n');
  }
  return '이해하지 못했어요 🙏 "오늘 할일", "포인트 순위", "다음 일정", "준비물 확인", "밀린 할일", "장보기 목록" 같은 걸 물어보세요!';
}

function toggleBot(){
  botOpen=!botOpen;
  const panel=document.getElementById('botPanel'), bd=document.getElementById('botBackdrop');
  if(botOpen){
    panel.style.display='flex'; bd.style.display='block';
    if(!botMsgs.length) botMsgs.push({from:'bot',text:'안녕하세요! 저는 우리집 AI 비서예요 🤖\n\n'+buildBotInsights().join('\n')});
    renderBot();
  } else {
    panel.style.display='none'; bd.style.display='none';
  }
}
function botAsk(q){
  botMsgs.push({from:'user',text:q});
  botMsgs.push({from:'bot',text:generateBotReply(q)});
  renderBot();
}
function botSend(){
  const inp=document.getElementById('botInput');
  if(!inp||!inp.value.trim())return;
  const v=inp.value.trim(); inp.value='';
  botAsk(v);
}
function renderBot(){
  const panel=document.getElementById('botPanel'); if(!panel)return;
  panel.innerHTML=`<div class="bot-header"><span>🤖 우리집 AI 비서</span><button onclick="toggleBot()">✕</button></div>
    <div class="bot-messages" id="botMessages">${botMsgs.map(m=>`<div class="bot-msg ${m.from}">${esc(m.text).replace(/\n/g,'<br>')}</div>`).join('')}</div>
    <div class="bot-quick">${BOT_QUICK.map(q=>`<button class="chip" onclick="botAsk('${q}')">${q}</button>`).join('')}</div>
    <div class="bot-input-row">
      <input type="text" id="botInput" placeholder="무엇이든 물어보세요..." onkeydown="if(event.key==='Enter')botSend()">
      <button onclick="botSend()">전송</button>
    </div>`;
  const msgsEl=document.getElementById('botMessages');
  if(msgsEl) msgsEl.scrollTop=msgsEl.scrollHeight;
}

/* ===== AI 비서봇 드래그 이동 ===== */
function initBotDrag(){
  const fab=document.getElementById('botFab');
  if(!fab)return;
  let dragging=false, moved=false, startX=0, startY=0, origX=0, origY=0;
  function place(x,y){
    fab.style.left=x+'px'; fab.style.top=y+'px';
    fab.style.right='auto'; fab.style.bottom='auto';
  }
  function clamp(x,y){
    const r=fab.getBoundingClientRect();
    x=Math.min(Math.max(8,x), window.innerWidth-r.width-8);
    y=Math.min(Math.max(8,y), window.innerHeight-r.height-8);
    return {x,y};
  }
  try{
    const saved=JSON.parse(localStorage.getItem('fam-bot-pos')||'null');
    if(saved){ const c=clamp(saved.x,saved.y); place(c.x,c.y); }
  }catch(e){}
  fab.addEventListener('pointerdown',(e)=>{
    dragging=true; moved=false;
    const r=fab.getBoundingClientRect();
    startX=e.clientX; startY=e.clientY; origX=r.left; origY=r.top;
    fab.setPointerCapture(e.pointerId);
  });
  fab.addEventListener('pointermove',(e)=>{
    if(!dragging)return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(Math.abs(dx)>5||Math.abs(dy)>5) moved=true;
    if(moved){ fab.classList.add('dragging'); place(origX+dx, origY+dy); }
  });
  fab.addEventListener('pointerup',(e)=>{
    if(!dragging)return;
    dragging=false; fab.classList.remove('dragging');
    if(moved){
      const r=fab.getBoundingClientRect();
      const c=clamp(r.left,r.top); place(c.x,c.y);
      try{localStorage.setItem('fam-bot-pos',JSON.stringify(c));}catch(e){}
    } else {
      toggleBot();
    }
  });
}

/* ===== INIT ===== */
loadState();
render();
initBotDrag();
</script>
